<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <style>
      @keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0 } }
      .cursor { animation: blink 1.2s step-end infinite; }
    </style>
  </defs>

  <!-- background -->
  <rect width="100" height="100" rx="22" fill="#0a0a0a"/>

  <!-- orbit ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="50" cy="10" r="2.5" fill="#8b5cf6"/>

  <!-- Xr text -->
  <text x="50" y="62" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="32" font-weight="700" fill="#f5f5f5" letter-spacing="-1">Xr</text>

  <!-- blinking cursor -->
  <rect x="70" y="36" width="3" height="26" rx="1.5" fill="#3b82f6" class="cursor"/>
</svg>
