<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64">
  <defs>
    <linearGradient id="orbit-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- orbit ring behind -->
  <ellipse cx="40" cy="32" rx="28" ry="26" fill="none" stroke="url(#orbit-grad)" stroke-width="1.2" opacity="0.5"/>
  <ellipse cx="40" cy="32" rx="20" ry="18" fill="none" stroke="url(#orbit-grad)" stroke-width="0.8" opacity="0.25" transform="rotate(-15,40,32)"/>

  <!-- satellite dot -->
  <circle cx="62" cy="16" r="2.5" fill="#8b5cf6"/>

  <!-- XR monogram -->
  <text x="40" y="40" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="22" font-weight="700" fill="#f5f5f5" letter-spacing="-1">XR</text>

  <!-- divider -->
  <line x1="74" y1="20" x2="74" y2="44" stroke="#404040" stroke-width="1"/>

  <!-- SPACE text -->
  <text x="86" y="40" font-family="'JetBrains Mono',monospace" font-size="18" font-weight="400" fill="#a3a3a3" letter-spacing="2">SPACE</text>
</svg>
